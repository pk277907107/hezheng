<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="600" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义渐变：左侧红到右侧蓝 圆形渐变 -->
  <defs>
    <radialGradient id="bgGradient" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E53E3E"/>
      <stop offset="50%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#3182CE"/>
    </radialGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="250" cy="200" r="180" fill="url(#bgGradient)"/>
  
  <!-- HZ 白色字母 (合政首字母) -->
  <g transform="translate(130, 110)" fill="#ffffff">
    <!-- H -->
    <rect x="0" y="0" width="35" height="180" rx="8"/>
    <rect x="85" y="0" width="35" height="180" rx="8"/>
    <rect x="0" y="72" width="120" height="36" rx="8"/>
    
    <!-- Z -->
    <rect x="140" y="0" width="120" height="35" rx="8"/>
    <polygon points="140 180 260 180 195 95" />
    <rect x="140" y="145" width="120" height="35" rx="8"/>
  </g>
  
  <!-- 下方中文：合政法律 -->
  <g transform="translate(250, 450)" text-anchor="middle">
    <text x="0" y="0" font-family="PingFang SC, Microsoft YaHei, sans-serif" 
          font-size="60" font-weight="bold" fill="#1a1a1a">合政法律</text>
  </g>
</svg>
